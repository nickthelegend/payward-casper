<template id="scene1-hook-template">
  <div
    data-composition-id="scene1-hook"
    data-width="1920"
    data-height="1080"
    data-duration="7.5"
  >
    <div class="s1-canvas">
      <div class="s1-grid"></div>
      <div class="s1-glow"></div>

      <!-- request card -->
      <div class="s1-card">
        <div class="s1-cardbar">
          <span class="s1-led"></span><span class="s1-led a"></span><span class="s1-led g"></span>
          <span class="s1-cardname">autonomous&nbsp;agent · http</span>
        </div>
        <div class="s1-body">
          <div class="s1-line s1-req">
            <span class="s1-arrow">▸</span><span class="s1-verb">GET</span
            ><span class="s1-path">/v/price/BTC-USD</span>
          </div>
          <div class="s1-line s1-wait"><span class="s1-dots">· · ·</span></div>
          <div class="s1-line s1-res">
            <span class="s1-arrow s1-arrow-in">←</span>
            <span class="s1-402">402</span>
            <span class="s1-402txt">PAYMENT&nbsp;REQUIRED</span>
          </div>
        </div>
        <div class="s1-wallet">
          <span class="s1-wlabel">agent&nbsp;wallet</span>
          <span class="s1-wval">0.00&nbsp;<i>USDC</i></span>
          <span class="s1-wnote">insufficient&nbsp;funds</span>
        </div>
      </div>

      <!-- headline -->
      <div class="s1-head">
        <div class="s1-l1">AI agents can transact.</div>
        <div class="s1-l2">They can't&nbsp;<em>pay.</em></div>
      </div>
    </div>

    <style>
      [data-composition-id="scene1-hook"] .s1-canvas {
        width: 1920px;
        height: 1080px;
        background: radial-gradient(120% 90% at 50% 30%, #0d0d16 0%, #07070b 60%);
        position: relative;
        overflow: hidden;
        font-family: "Inter", sans-serif;
      }
      [data-composition-id="scene1-hook"] .s1-grid {
        position: absolute;
        inset: -2px;
        background-image: linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
        background-size: 64px 64px;
        mask-image: radial-gradient(80% 70% at 50% 40%, #000 35%, transparent 80%);
        opacity: 0;
      }
      [data-composition-id="scene1-hook"] .s1-glow {
        position: absolute;
        left: 50%;
        top: 300px;
        width: 900px;
        height: 900px;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(255, 59, 92, 0.16), transparent 62%);
        opacity: 0;
        filter: blur(8px);
      }
      [data-composition-id="scene1-hook"] .s1-card {
        position: absolute;
        left: 50%;
        top: 188px;
        width: 760px;
        transform: translateX(-50%);
        background: linear-gradient(180deg, #14141f, #0f0f18);
        border: 1px solid #262633;
        border-radius: 18px;
        box-shadow: 0 40px 90px rgba(0, 0, 0, 0.6);
        overflow: hidden;
        opacity: 0;
      }
      [data-composition-id="scene1-hook"] .s1-cardbar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 18px 26px;
        border-bottom: 1px solid #20202c;
        background: rgba(255, 255, 255, 0.015);
      }
      [data-composition-id="scene1-hook"] .s1-led {
        width: 13px;
        height: 13px;
        border-radius: 50%;
        background: #ff5f56;
      }
      [data-composition-id="scene1-hook"] .s1-led.a {
        background: #ffbd2e;
      }
      [data-composition-id="scene1-hook"] .s1-led.g {
        background: #27c93f;
      }
      [data-composition-id="scene1-hook"] .s1-cardname {
        margin-left: 12px;
        font-family: "JetBrains Mono", monospace;
        font-size: 21px;
        color: #6f6f86;
        letter-spacing: 0.02em;
      }
      [data-composition-id="scene1-hook"] .s1-body {
        padding: 34px 40px 14px;
        font-family: "JetBrains Mono", monospace;
        font-size: 34px;
      }
      [data-composition-id="scene1-hook"] .s1-line {
        display: flex;
        align-items: center;
        gap: 16px;
        height: 56px;
      }
      [data-composition-id="scene1-hook"] .s1-arrow {
        color: #5b8cff;
        opacity: 0;
      }
      [data-composition-id="scene1-hook"] .s1-arrow-in {
        color: #ff3b5c;
      }
      [data-composition-id="scene1-hook"] .s1-verb {
        color: #25d3a6;
        font-weight: 700;
      }
      [data-composition-id="scene1-hook"] .s1-path {
        color: #c9c9da;
      }
      [data-composition-id="scene1-hook"] .s1-req {
        opacity: 0;
      }
      [data-composition-id="scene1-hook"] .s1-wait {
        opacity: 0;
      }
      [data-composition-id="scene1-hook"] .s1-dots {
        color: #4f4f64;
        letter-spacing: 6px;
      }
      [data-composition-id="scene1-hook"] .s1-res {
        opacity: 0;
      }
      [data-composition-id="scene1-hook"] .s1-402 {
        font-weight: 700;
        color: #ff3b5c;
        font-size: 40px;
        text-shadow: 0 0 24px rgba(255, 59, 92, 0.55);
      }
      [data-composition-id="scene1-hook"] .s1-402txt {
        color: #ff7088;
        letter-spacing: 0.12em;
        font-size: 28px;
        font-weight: 600;
      }
      [data-composition-id="scene1-hook"] .s1-wallet {
        display: flex;
        align-items: center;
        gap: 18px;
        margin: 16px 40px 34px;
        padding: 18px 24px;
        border: 1px solid #2a2030;
        border-radius: 12px;
        background: rgba(255, 59, 92, 0.05);
        font-family: "JetBrains Mono", monospace;
        opacity: 0;
      }
      [data-composition-id="scene1-hook"] .s1-wlabel {
        font-size: 20px;
        color: #8b8b9e;
        text-transform: uppercase;
        letter-spacing: 0.14em;
      }
      [data-composition-id="scene1-hook"] .s1-wval {
        font-size: 30px;
        font-weight: 700;
        color: #ff5c78;
      }
      [data-composition-id="scene1-hook"] .s1-wval i {
        font-style: normal;
        font-size: 22px;
        color: #8b8b9e;
      }
      [data-composition-id="scene1-hook"] .s1-wnote {
        margin-left: auto;
        font-size: 19px;
        color: #b0566c;
        letter-spacing: 0.04em;
      }
      [data-composition-id="scene1-hook"] .s1-head {
        position: absolute;
        left: 0;
        right: 0;
        top: 760px;
        text-align: center;
      }
      [data-composition-id="scene1-hook"] .s1-l1 {
        font-size: 52px;
        font-weight: 600;
        color: #9a9ab0;
        letter-spacing: -0.01em;
        opacity: 0;
      }
      [data-composition-id="scene1-hook"] .s1-l2 {
        font-size: 96px;
        font-weight: 900;
        color: #f3f3f8;
        letter-spacing: -0.03em;
        margin-top: 6px;
        opacity: 0;
      }
      [data-composition-id="scene1-hook"] .s1-l2 em {
        font-style: normal;
        color: #ff3b5c;
        text-shadow: 0 0 40px rgba(255, 59, 92, 0.4);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const q = (s) => '[data-composition-id="scene1-hook"] ' + s;
        const tl = gsap.timeline({ paused: true });

        tl.to(q(".s1-grid"), { opacity: 1, duration: 1.0, ease: "power2.out" }, 0.1);
        tl.fromTo(
          q(".s1-card"),
          { opacity: 0, y: 30, scale: 0.98 },
          { opacity: 1, y: 0, scale: 1, duration: 0.7, ease: "power3.out" },
          0.3,
        );

        // request types in
        tl.to(q(".s1-req"), { opacity: 1, duration: 0.3 }, 0.9);
        tl.to(q(".s1-req .s1-arrow"), { opacity: 1, duration: 0.2 }, 0.9);

        // thinking dots pulse
        tl.to(q(".s1-wait"), { opacity: 1, duration: 0.2 }, 1.5);
        tl.to(q(".s1-dots"), { opacity: 0.35, duration: 0.35, repeat: 2, yoyo: true }, 1.6);

        // 402 stamps in
        tl.to(q(".s1-wait"), { opacity: 0, duration: 0.2 }, 2.5);
        tl.to(q(".s1-glow"), { opacity: 1, duration: 0.5, ease: "power2.out" }, 2.55);
        tl.fromTo(
          q(".s1-res"),
          { opacity: 0 },
          { opacity: 1, duration: 0.15 },
          2.6,
        );
        tl.fromTo(
          q(".s1-402"),
          { scale: 2.2, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.4, ease: "back.out(2)" },
          2.6,
        );
        tl.fromTo(
          q(".s1-402txt"),
          { opacity: 0, x: -10 },
          { opacity: 1, x: 0, duration: 0.3 },
          2.9,
        );
        // shake the card on impact
        tl.to(q(".s1-card"), { x: -8, duration: 0.05, repeat: 5, yoyo: true }, 2.6);
        tl.set(q(".s1-card"), { x: 0 }, 3.0);

        // wallet 0.00 flashes
        tl.fromTo(
          q(".s1-wallet"),
          { opacity: 0, y: 12 },
          { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" },
          3.2,
        );
        tl.fromTo(
          q(".s1-wallet"),
          { boxShadow: "0 0 0 rgba(255,59,92,0)" },
          { boxShadow: "0 0 30px rgba(255,59,92,0.35)", duration: 0.3, yoyo: true, repeat: 1 },
          3.5,
        );

        // headline lands
        tl.fromTo(
          q(".s1-l1"),
          { opacity: 0, y: 24 },
          { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" },
          3.9,
        );
        tl.fromTo(
          q(".s1-l2"),
          { opacity: 0, y: 40, scale: 0.96 },
          { opacity: 1, y: 0, scale: 1, duration: 0.7, ease: "power4.out" },
          4.7,
        );
        tl.fromTo(
          q(".s1-l2 em"),
          { color: "#f3f3f8" },
          { color: "#ff3b5c", duration: 0.3 },
          5.25,
        );

        // gentle settle, then exit cue
        tl.to(q(".s1-canvas"), { scale: 1.015, duration: 2.0, ease: "sine.inOut" }, 5.3);
        tl.to(
          q(".s1-card, .s1-head"),
          { opacity: 0, y: -16, duration: 0.45, ease: "power2.in" },
          7.05,
        );

        window.__timelines = window.__timelines || {};
        window.__timelines["scene1-hook"] = tl;
      })();
    </script>
  </div>
</template>
