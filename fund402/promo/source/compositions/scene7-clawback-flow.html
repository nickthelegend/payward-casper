<template id="scene7-clawback-flow-template">
  <div
    data-composition-id="scene7-clawback-flow"
    data-width="1920"
    data-height="1080"
    data-duration="17"
  >
    <div class="s7-canvas">
      <div class="s7-grid"></div>

      <div class="s7-head">
        <div class="s7-h1">Held in escrow. Released — or clawed back.</div>
        <div class="s7-h2">An AI verifier adjudicates the spec against what was delivered.</div>
      </div>

      <!-- connector layer -->
      <svg class="s7-wires" viewBox="0 0 1920 1080" width="1920" height="1080">
        <path class="w7 w-be" d="M392 498 L470 498" />
        <path class="w7 w-ea" d="M826 498 L912 498" />
        <path class="w7 w-sa" d="M1112 706 L1112 576" />
        <path class="w7 w-rel" d="M1310 452 L1418 326" />
        <path class="w7 w-ref" d="M1310 548 L1418 690" />
      </svg>

      <!-- nodes -->
      <div class="s7-node n-buyer">
        <div class="s7-ntop">◇ buyer agent</div>
        <div class="s7-ntitle">Buyer</div>
        <div class="s7-nsub">pays for a deliverable</div>
      </div>

      <div class="s7-node n-escrow">
        <div class="s7-ntop violet">⚖ Clawback escrow</div>
        <div class="s7-state">HELD</div>
        <div class="s7-chip gold">1,000,000 F402</div>
      </div>

      <div class="s7-node n-ai">
        <div class="s7-ntop violet">✦ Groq attester</div>
        <div class="s7-ntitle">AI Verifier</div>
        <div class="s7-mono violet">adjudicate(spec, response)</div>
        <div class="s7-think">adjudicating…</div>
      </div>

      <div class="s7-node n-seller">
        <div class="s7-ntop">◇ seller agent</div>
        <div class="s7-nsub">delivers · response hashed</div>
      </div>

      <!-- outcomes -->
      <div class="s7-node n-release">
        <div class="s7-otag teal">RELEASE</div>
        <div class="s7-ntitle">Seller paid</div>
        <div class="s7-chip teal">+1,000,000 · rep +win</div>
      </div>
      <div class="s7-wtag t-rel">✓ meets spec</div>

      <div class="s7-node n-refund">
        <div class="s7-otag violet">REFUND ↩</div>
        <div class="s7-ntitle">Buyer clawed back</div>
        <div class="s7-chip violet">refunded · seller rep −loss</div>
      </div>
      <div class="s7-wtag t-ref">✗ fails spec</div>

      <!-- proofs -->
      <div class="s7-proof">
        <span class="s7-pf teal">✓ honest — open 02bfd9cf… · release 87a30923…</span>
        <span class="s7-pdiv"></span>
        <span class="s7-pf violet">↩ clawback — dispute 0106f5e0… · resolve f6f6c5db…</span>
      </div>
    </div>

    <style>
      [data-composition-id="scene7-clawback-flow"] .s7-canvas {

      [data-composition-id="scene7-clawback-flow"] .n-buyer {

      }
      [data-composition-id="scene7-clawback-flow"] .n-ai {

          linear-gradient(135deg, #c4b5ff, #7c6cff) border-box;

      }
      [data-composition-id="scene7-clawback-flow"] .n-seller {

      [data-composition-id="scene7-clawback-flow"] .n-release {

      [data-composition-id="scene7-clawback-flow"] .n-refund {

      [data-composition-id="scene7-clawback-flow"] .s7-ntop {

      [data-composition-id="scene7-clawback-flow"] .s7-nsub {

      [data-composition-id="scene7-clawback-flow"] .s7-state {

      [data-composition-id="scene7-clawback-flow"] .s7-chip {

      }
      [data-composition-id="scene7-clawback-flow"] .s7-chip.gold {
        background: rgba(245, 179, 1, 0.1);
        border: 1px solid rgba(245, 179, 1, 0.32);
        color: #f5b301;
      }
      [data-composition-id="scene7-clawback-flow"] .s7-chip.teal {
        background: rgba(37, 211, 166, 0.1);
        border: 1px solid rgba(37, 211, 166, 0.32);

      }
      [data-composition-id="scene7-clawback-flow"] .s7-chip.violet {
        background: rgba(161, 140, 255, 0.1);

      [data-composition-id="scene7-clawback-flow"] .s7-otag.teal {

      [data-composition-id="scene7-clawback-flow"] .s7-proof {
        position: absolute;
        left: 50%;
        top: 904px;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 26px;
        font-family: "JetBrains Mono", monospace;
        font-size: 22px;
        opacity: 0;
      }
      [data-composition-id="scene7-clawback-flow"] .s7-pf.teal {
        color: #25d3a6;
      }
      [data-composition-id="scene7-clawback-flow"] .s7-pf.violet {
        color: #a18cff;
      }
      [data-composition-id="scene7-clawback-flow"] .s7-pdiv {
        width: 1px;

        background: #2a2a3a;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const q = (s) => '[data-composition-id="scene7-clawback-flow"] ' + s;
        const tl = gsap.timeline({ paused: true });
        const setText = (s, t) => { const e = document.querySelector(q(s)); if (e) e.textContent = t; };

        tl.fromTo(q(".s7-h1"), { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.55, ease: "power3.out" }, 0.1);
        tl.fromTo(q(".s7-h2"), { opacity: 0, y: 12 }, { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" }, 0.4);

        // buyer escrows
        tl.fromTo(q(".n-buyer"), { opacity: 0, x: -20 }, { opacity: 1, x: 0, duration: 0.45, ease: "power3.out" }, 1.0);
        tl.fromTo(q(".n-escrow"), { opacity: 0, scale: 0.96 }, { opacity: 1, scale: 1, duration: 0.45, ease: "power3.out" }, 1.3);
        tl.to(q(".w-be"), { strokeDashoffset: 0, duration: 0.5, ease: "power2.inOut" }, 1.5);

        // seller delivers, AI engages
        tl.fromTo(q(".n-seller"), { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.45, ease: "power3.out" }, 2.1);
        tl.fromTo(q(".n-ai"), { opacity: 0, scale: 0.96 }, { opacity: 1, scale: 1, duration: 0.45, ease: "power3.out" }, 2.4);
        tl.to(q(".w-ea"), { strokeDashoffset: 0, duration: 0.45, ease: "power2.inOut" }, 2.6);
        tl.to(q(".w-sa"), { strokeDashoffset: 0, duration: 0.45, ease: "power2.inOut" }, 2.9);
        tl.fromTo(q(".s7-think"), { opacity: 0 }, { opacity: 1, duration: 0.3 }, 3.3);
        tl.to(q(".s7-think"), { opacity: 0.35, duration: 0.4, repeat: 2, yoyo: true }, 3.5);

        // ===== HONEST: meets spec -> release =====
        tl.call(() => setText(".s7-think", "✓ meets spec"), null, 4.6);
        tl.to(q(".s7-think"), { color: "#25d3a6", opacity: 1, duration: 0.3 }, 4.6);
        tl.to(q(".w-rel"), { strokeDashoffset: 0, duration: 0.6, ease: "power2.inOut", onStart() { const e = document.querySelector(q(".w-rel")); if (e) e.classList.add("lit"); } }, 4.9);
        tl.to(q(".t-rel"), { opacity: 1, duration: 0.3 }, 5.0);
        tl.fromTo(q(".n-release"), { opacity: 0, x: 20, scale: 0.96 }, { opacity: 1, x: 0, scale: 1, duration: 0.5, ease: "back.out(1.6)" }, 5.3);
        tl.fromTo(q(".n-release .s7-chip"), { scale: 0.8, opacity: 0.5 }, { scale: 1, opacity: 1, duration: 0.4, ease: "back.out(2)" }, 5.9);
        tl.fromTo(q(".n-release"), { boxShadow: "0 0 0 rgba(37,211,166,0)" }, { boxShadow: "0 0 40px rgba(37,211,166,0.28)", duration: 0.5, yoyo: true, repeat: 1 }, 6.0);

        // ===== PIVOT =====
        tl.call(() => setText(".s7-think", "…and if it's junk?"), null, 7.6);
        tl.to(q(".s7-think"), { color: "#7c6cff", duration: 0.3 }, 7.6);
        tl.to(q(".n-release"), { opacity: 0.5, duration: 0.4 }, 7.8);
        tl.to(q(".w-rel"), { opacity: 0.4, duration: 0.4 }, 7.8);

        // ===== BAD: junk -> dispute -> refund (clawback) =====
        tl.call(() => setText(".s7-state", "DISPUTED"), null, 8.6);
        tl.to(q(".n-escrow .s7-state"), { color: "#ff6e88", duration: 0.3 }, 8.6);
        tl.call(() => setText(".s7-think", "✗ status 'error' ≠ 'ok'"), null, 9.0);
        tl.to(q(".s7-think"), { color: "#a18cff", duration: 0.3 }, 9.0);
        tl.to(q(".w-ref"), { strokeDashoffset: 0, duration: 0.6, ease: "power2.inOut", onStart() { const e = document.querySelector(q(".w-ref")); if (e) e.classList.add("lit"); } }, 9.4);
        tl.to(q(".t-ref"), { opacity: 1, duration: 0.3 }, 9.5);
        tl.fromTo(q(".n-refund"), { opacity: 0, x: 20, scale: 0.96 }, { opacity: 1, x: 0, scale: 1, duration: 0.5, ease: "back.out(1.6)" }, 9.8);
        tl.fromTo(q(".n-refund .s7-chip"), { scale: 0.8, opacity: 0.5 }, { scale: 1, opacity: 1, duration: 0.4, ease: "back.out(2)" }, 10.4);
        tl.call(() => setText(".s7-state", "REFUNDED"), null, 10.6);
        tl.fromTo(q(".n-refund"), { boxShadow: "0 0 0 rgba(161,140,255,0)" }, { boxShadow: "0 0 44px rgba(161,140,255,0.32)", duration: 0.5, yoyo: true, repeat: 1 }, 10.6);

        // proofs
        tl.fromTo(q(".s7-proof"), { opacity: 0, y: 16 }, { opacity: 1, y: 0, duration: 0.55, ease: "power3.out" }, 12.3);
        // restore release branch to full for the final "both outcomes" frame
        tl.to(q(".n-release"), { opacity: 1, duration: 0.5 }, 13.2);
        tl.to(q(".w-rel"), { opacity: 1, duration: 0.5 }, 13.2);

        // exit
        tl.to(q(".s7-head, .s7-node, .s7-wires, .s7-wtag, .s7-proof"), { opacity: 0, y: -14, duration: 0.45, ease: "power2.in" }, 16.5);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene7-clawback-flow"] = tl;
      })();
    </script>
  </div>
</template>
