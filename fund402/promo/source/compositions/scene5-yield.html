<template id="scene5-yield-template">
  <div
    data-composition-id="scene5-yield"
    data-width="1920"
    data-height="1080"
    data-duration="9.5"
  >
    <div class="s5y-canvas">
      <div class="s5y-grid"></div>
      <div class="s5y-glow"></div>

      <div class="s5y-head">
        <div class="s5y-h1">Liquidity that compounds.</div>
        <div class="s5y-h2">Every borrow pays a <b>5% fee</b> — straight to the providers.</div>
      </div>

      <!-- deposit -->
      <div class="s5y-side s5y-dep">
        <div class="s5y-slabel">LP DEPOSITS</div>
        <div class="s5y-snum teal">2,000,000</div>
        <div class="s5y-sunit">F402</div>
      </div>

      <!-- pool -->
      <div class="s5y-pool">
        <div class="s5y-feerow">
          <span class="s5y-fee">+ fee</span><span class="s5y-fee">+ fee</span
          ><span class="s5y-fee">+ fee</span><span class="s5y-fee">+ fee</span>
        </div>
        <div class="s5y-bartrack">
          <span class="s5y-bar-base"></span><span class="s5y-bar-yield"></span>
        </div>
        <div class="s5y-poolmeta">
          <span class="s5y-share">share price <b class="s5y-sp">1.0000</b></span>
          <span class="s5y-badge">+2.5%</span>
        </div>
      </div>

      <!-- withdraw -->
      <div class="s5y-side s5y-wd">
        <div class="s5y-slabel">LP WITHDRAWS</div>
        <div class="s5y-snum gold"><span class="s5y-wval">2,000,000</span></div>
        <div class="s5y-sunit gold">+50,000 realized yield</div>
      </div>

      <div class="s5y-foot">
        <span class="s5y-fmono">repay_latest()</span> — agents auto-repay from earnings; the fee becomes LP yield ·
        <span class="s5y-dep1">repay 80e90a43…</span> · <span class="s5y-dep2">withdraw 44318b5b…</span>
      </div>
    </div>

    <style>
      [data-composition-id="scene5-yield"] .s5y-canvas {
        width: 1920px;
        height: 1080px;
        background: radial-gradient(125% 100% at 50% 30%, #0d0d16 0%, #07070b 60%);
        position: relative;
        overflow: hidden;
        font-family: "Inter", sans-serif;
      }
      [data-composition-id="scene5-yield"] .s5y-grid {
        position: absolute;
        inset: -2px;
        background-image: linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
        background-size: 80px 80px;
        mask-image: radial-gradient(90% 80% at 50% 45%, #000 40%, transparent 86%);
      }
      [data-composition-id="scene5-yield"] .s5y-glow {
        position: absolute;
        left: 50%;
        top: 540px;
        width: 1200px;
        height: 560px;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(245, 179, 1, 0.1), transparent 62%);
        opacity: 0;
        filter: blur(10px);
      }
      [data-composition-id="scene5-yield"] .s5y-head {
        position: absolute;
        left: 0;
        right: 0;
        top: 110px;
        text-align: center;
      }
      [data-composition-id="scene5-yield"] .s5y-h1 {
        font-size: 66px;
        font-weight: 900;
        letter-spacing: -0.03em;
        color: #f3f3f8;
        opacity: 0;
      }
      [data-composition-id="scene5-yield"] .s5y-h2 {
        font-size: 31px;
        font-weight: 500;
        color: #8b8b9e;
        margin-top: 8px;
        opacity: 0;
      }
      [data-composition-id="scene5-yield"] .s5y-h2 b {
        color: #f5b301;
        font-weight: 700;
      }
      [data-composition-id="scene5-yield"] .s5y-side {
        position: absolute;
        top: 430px;
        width: 360px;
        text-align: center;
        opacity: 0;
      }
      [data-composition-id="scene5-yield"] .s5y-dep {
        left: 120px;
      }
      [data-composition-id="scene5-yield"] .s5y-wd {
        right: 120px;
      }
      [data-composition-id="scene5-yield"] .s5y-slabel {
        font-family: "JetBrains Mono", monospace;
        font-size: 21px;
        letter-spacing: 0.22em;
        color: #8b8b9e;
      }
      [data-composition-id="scene5-yield"] .s5y-snum {
        font-family: "JetBrains Mono", monospace;
        font-size: 56px;
        font-weight: 700;
        margin-top: 14px;
      }
      [data-composition-id="scene5-yield"] .s5y-snum.teal {
        color: #25d3a6;
      }
      [data-composition-id="scene5-yield"] .s5y-snum.gold {
        color: #f5b301;
        text-shadow: 0 0 26px rgba(245, 179, 1, 0.35);
      }
      [data-composition-id="scene5-yield"] .s5y-sunit {
        font-family: "JetBrains Mono", monospace;
        font-size: 22px;
        color: #6f6f86;
        margin-top: 10px;
      }
      [data-composition-id="scene5-yield"] .s5y-sunit.gold {
        color: #f5b301;
      }
      [data-composition-id="scene5-yield"] .s5y-pool {
        position: absolute;
        left: 560px;
        right: 560px;
        top: 446px;
      }
      [data-composition-id="scene5-yield"] .s5y-feerow {
        display: flex;
        justify-content: space-around;
        margin-bottom: 18px;
        height: 30px;
      }
      [data-composition-id="scene5-yield"] .s5y-fee {
        font-family: "JetBrains Mono", monospace;
        font-size: 22px;
        font-weight: 700;
        color: #f5b301;
        opacity: 0;
      }
      [data-composition-id="scene5-yield"] .s5y-bartrack {
        height: 30px;
        border-radius: 15px;
        background: #14141f;
        border: 1px solid #262633;
        display: flex;
        overflow: hidden;
      }
      [data-composition-id="scene5-yield"] .s5y-bar-base {
        width: 0%;
        background: linear-gradient(90deg, #1c8f74, #25d3a6);
      }
      [data-composition-id="scene5-yield"] .s5y-bar-yield {
        width: 0%;
        background: linear-gradient(90deg, #f5b301, #ffd152);
        box-shadow: 0 0 18px rgba(245, 179, 1, 0.5);
      }
      [data-composition-id="scene5-yield"] .s5y-poolmeta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 18px;
      }
      [data-composition-id="scene5-yield"] .s5y-share {
        font-family: "JetBrains Mono", monospace;
        font-size: 24px;
        color: #8b8b9e;
      }
      [data-composition-id="scene5-yield"] .s5y-share b {
        color: #25d3a6;
        font-weight: 700;
      }
      [data-composition-id="scene5-yield"] .s5y-badge {
        font-family: "JetBrains Mono", monospace;
        font-size: 26px;
        font-weight: 700;
        padding: 7px 16px;
        border-radius: 10px;
        background: rgba(245, 179, 1, 0.12);
        border: 1px solid rgba(245, 179, 1, 0.34);
        color: #f5b301;
        opacity: 0;
      }
      [data-composition-id="scene5-yield"] .s5y-foot {
        position: absolute;
        left: 0;
        right: 0;
        top: 820px;
        text-align: center;
        font-family: "JetBrains Mono", monospace;
        font-size: 24px;
        color: #8b8b9e;
        opacity: 0;
      }
      [data-composition-id="scene5-yield"] .s5y-fmono {
        color: #c9c9da;
        font-weight: 600;
      }
      [data-composition-id="scene5-yield"] .s5y-dep1,
      [data-composition-id="scene5-yield"] .s5y-dep2 {
        color: #5b8cff;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const sel = '[data-composition-id="scene5-yield"] ';
        const q = (s) => sel + s;
        const tl = gsap.timeline({ paused: true });
        const spEl = document.querySelector(q(".s5-sp")) || document.querySelector(q(".s5y-sp"));
        const wvEl = document.querySelector(q(".s5y-wval"));
        const fmt = (n) => Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        const sp = { v: 1.0 };
        const wv = { v: 2000000 };

        tl.to(q(".s5y-glow"), { opacity: 1, duration: 1.0, ease: "power2.out" }, 0.1);
        tl.fromTo(q(".s5y-h1"), { opacity: 0, y: 22 }, { opacity: 1, y: 0, duration: 0.55, ease: "power3.out" }, 0.1);
        tl.fromTo(q(".s5y-h2"), { opacity: 0, y: 14 }, { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" }, 0.4);

        // deposit appears, pool base fills
        tl.fromTo(q(".s5y-dep"), { opacity: 0, x: -24 }, { opacity: 1, x: 0, duration: 0.5, ease: "power3.out" }, 1.0);
        tl.to(q(".s5y-bar-base"), { width: "92%", duration: 0.8, ease: "power2.out" }, 1.3);

        // fees drip in (stagger), share price + yield grow
        tl.to(q(".s5y-fee"), { opacity: 1, y: 6, duration: 0.3, stagger: 0.18, ease: "power1.in" }, 2.2);
        tl.to(q(".s5y-fee"), { opacity: 0.25, duration: 0.3, stagger: 0.18 }, 2.5);
        tl.to(q(".s5y-bar-yield"), { width: "8%", duration: 0.7, ease: "power2.out" }, 2.6);
        tl.to(sp, { v: 1.025, duration: 1.1, ease: "power2.out", onUpdate() { if (spEl) spEl.textContent = sp.v.toFixed(4); } }, 2.6);
        tl.fromTo(q(".s5y-badge"), { opacity: 0, scale: 0.6 }, { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(2.2)" }, 3.4);

        // withdraw reveals, number ticks up past deposit
        tl.fromTo(q(".s5y-wd"), { opacity: 0, x: 24 }, { opacity: 1, x: 0, duration: 0.5, ease: "power3.out" }, 3.8);
        tl.to(wv, { v: 2050000, duration: 1.0, ease: "power2.out", onUpdate() { if (wvEl) wvEl.textContent = fmt(wv.v); } }, 4.0);
        tl.fromTo(q(".s5y-snum.gold"), { textShadow: "0 0 0 rgba(245,179,1,0)" }, { textShadow: "0 0 30px rgba(245,179,1,0.5)", duration: 0.5, yoyo: true, repeat: 1 }, 5.0);

        // proof
        tl.fromTo(q(".s5y-foot"), { opacity: 0, y: 12 }, { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" }, 5.4);

        // exit
        tl.to(q(".s5y-head, .s5y-side, .s5y-pool, .s5y-foot"), { opacity: 0, y: -16, duration: 0.45, ease: "power2.in" }, 9.05);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene5-yield"] = tl;
      })();
    </script>
  </div>
</template>
